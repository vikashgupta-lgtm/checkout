query RunInput {
  cart {
    cost {
      totalAmount {
        amount
      }
    }
    deliveryGroups {
      deliveryAddress {
        zip
      }
    }
    lines {
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
            title
          }
        }
      }
    }
  }
  paymentMethods {
    id
    name
  }
  paymentCustomization {
    metafield(namespace: "$app:cod-payment-logic", key: "function-configuration") {
      value
    }
  }
}
